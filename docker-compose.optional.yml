version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./runtime/qdrant:/qdrant/storage

  neo4j:
    image: neo4j:5.26.24-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/secretgraph
    volumes:
      - ./runtime/neo4j/data:/data
      - ./runtime/neo4j/logs:/logs
